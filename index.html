<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Analysis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const data = {
      platform_detected: "LinkedIn",
      author_type: "Solopreneur coach / marketing consultant",
      target_audience: "Solopreneurs, early-stage founders, and freelance consultants struggling with content marketing and platform strategy",
      options: {
        positive: [
          "The core advice (focus on 1-2 platforms) is genuinely sound and actionable",
          "The 3-step framework gives readers something concrete to do",
          "The pain point description ('exhausted, posting constantly, zero traction') is highly relatable and emotionally accurate",
          "The checklist format makes the advice scannable and implementable",
          "Ending with a direct question ('Which platform is working best for you?') is an effective engagement driver"
        ],
        storytelling_only: [
          "'This 1 mindset shift changed everything for me and every client' — broad, unverifiable, classic guru opener",
          "'Not because they weren't working hard enough' — the empathy pivot feels formulaic rather than earned",
          "'Here's what most gurus won't tell you' — positions author as insider but the advice is widely known",
          "'Stronger brand credibility, higher engagement, and real business growth backed by actual data' — vague results with no numbers cited",
          "The 'we did less but far better' closing is inspirational filler masquerading as insight"
        ]
      },
      predictability: {
        is_predictable: true,
        explanation: "Follows one of LinkedIn's most recycled templates: identify common mistake → validate the pain → reveal 'what gurus won't tell you' → offer a numbered framework → close with humble personal pivot. A reader familiar with LinkedIn content can predict the conclusion from paragraph two. There is no surprise, no counterintuitive angle, no moment that subverts expectation."
      },
      alternative_suggestions: [
        "Lead with a specific client story with real numbers — 'My client was posting on 6 platforms daily. After 90 days, zero leads. We cut to LinkedIn only. In 30 days, 3 inbound calls.'",
        "Introduce a genuine counterpoint: 'Some creators do need to be on multiple platforms — but they have teams. Here's how to know which camp you're in.'",
        "Replace 'what gurus won't tell you' with a direct, confident statement. That phrase is now a cliché that signals exactly the kind of guru content it claims to subvert.",
        "Make the personal pivot concrete: Instead of 'I shifted from 6 platforms to 1-2,' cite real client metrics — engagement rate before and after, lead volume, revenue impact.",
        "Reframe the hook: Instead of 'Being on every platform is killing your growth,' try 'I watched a founder post 180 times in 90 days and get zero clients. Here's the one thing we changed.'"
      ],
      story_analysis: [
        { segment: "Hook", content: "Being on every platform is killing your growth. This 1 mindset shift changed everything...", value_assessment: "neutral", explanation: "The premise is valid but the delivery is worn. 'Changed everything for every client' is an overclaim a skeptical reader will immediately discount." },
        { segment: "Problem Setup", content: "When most solopreneurs start out, they post everywhere... burn out in 3–4 months.", value_assessment: "positive", explanation: "Strongest section. The pain is described with enough specificity that the target audience will genuinely feel seen." },
        { segment: "Empathy Pivot", content: "Not because they weren't working hard enough. Because they were solving the wrong problem.", value_assessment: "positive", explanation: "Reframing failure as a strategy problem rather than effort problem is empowering and lands well." },
        { segment: "Authority Claim", content: "I see this all the time in my work. Founders are exhausted. Posting constantly.", value_assessment: "neutral", explanation: "Without client numbers or case studies, this functions as credibility signaling rather than credibility building." },
        { segment: "The 'Secret'", content: "Here's what most 'gurus' won't tell you: Your audience is NOT on every platform.", value_assessment: "negative", explanation: "Backfires. 'Gurus won't tell you' is itself a guru tactic, and the insight it delivers is widely discussed. Positions author as insider while delivering mainstream advice." },
        { segment: "Framework", content: "✅ Audit where clients found you... 3-step framework to find YOUR platform...", value_assessment: "positive", explanation: "Most genuinely useful section. Practical, low-friction, actionable — especially 'ask your 3 best clients where they found you.'" },
        { segment: "Personal Proof", content: "I shifted from 6 platforms to 1-2. The result? Stronger brand credibility, higher engagement, real business growth backed by actual data.", value_assessment: "negative", explanation: "Critical missed opportunity. The author had a real story and replaced it with vague adjectives. 'Real business growth backed by actual data' citing no data is the opposite of credible." },
        { segment: "Closing & CTA", content: "You don't need to be on every platform. You need to own the right one.", value_assessment: "positive", explanation: "Clean, punchy close. The comment CTA is specific enough to generate real responses." }
      ],
      tone_and_impact: {
        tone: "Persuasive, self-promotional",
        effective: true,
        reader_impact: "Ideal reader (overwhelmed solopreneur) will feel validated and motivated. Skeptical reader will notice the lack of real data, recycled structure, and vague proof points — disengaging precisely when the author tries to establish authority."
      },
      extended_analysis: {
        rhetorical_devices: [
          "Appeal to authority — 'I see this all the time in my work' without supporting evidence",
          "False insider framing — 'What most gurus won't tell you' while using guru tactics",
          "Anaphora — 'Founders are exhausted. Posting constantly. Getting zero traction.' creates rhythmic emotional build",
          "Implied social proof — 'me and every client I've worked with' implies large client base without evidence",
          "Scarcity/urgency — 'Commit to 90 days' creates a bounded challenge that feels achievable",
          "Relatability performance — burnout narrative designed to feel personally familiar without specific details"
        ],
        subtext: "This is a soft lead generation post for consulting services. Every pain point described is a problem the author implicitly positions themselves to solve. The shift from '6 platforms to 1-2' is not just advice — it's a service pitch. The comment CTA surfaces potential clients (people who haven't found a working platform yet).",
        authenticity_score: 5,
        authenticity_justification: "The core experience and advice feel real — the author has likely worked with clients on this problem. But the delivery is heavily templated, the proof points are vague, and the 'anti-guru' framing is itself a well-known influencer tactic. Genuine insight wrapped in formulaic packaging.",
        virality_assessment: "Moderate-to-high engagement within the LinkedIn solopreneur niche — not from originality but from targeting a widespread real pain point. Unlikely to break out of existing audience bubble or generate significant shares because it offers no surprising insight."
      },
      overall_critique: {
        strengths: "Nails the pain point articulation — the 3-4 month burnout cycle is specific enough to feel real. The 3-step framework is genuinely useful advice. The CTA is better than average for LinkedIn.",
        weaknesses: "Undermines its own authority at the exact moment it tries hardest to establish it. 'Real business growth backed by actual data' with zero data cited is a credibility killer. The 'what gurus won't tell you' framing is so overused it now signals the opposite of its intent.",
        hidden_agenda: "Soft lead generation for the author's consulting services. Every pain point makes the reader feel their approach is broken, positions the author as the person who solved it, and invites engagement from potential clients.",
        credibility_assessment: "Mixed. The framework is credible because it's actionable. The authority claims erode credibility by relying on vague language where concrete numbers would be far more convincing. The author had a real story and buried it in adjectives.",
        platform_fit: "Well-suited to LinkedIn in format and tone. Length, structure, emoji use, and CTA all follow LinkedIn norms. However, the content niche is saturated — this competes with dozens of similar posts weekly.",
        top_improvement: "Replace the vague proof section with one real client outcome. One specific number ('From 0.4% to 2.1% engagement in 60 days') does more for credibility than three paragraphs of adjectives."
      },
      rewritten_post: {
        post: `Most solopreneurs I work with are posting on 5 or 6 platforms when we first meet.

Instagram. LinkedIn. X. Facebook. Threads. YouTube.

Every day. For months. With almost nothing to show for it.

The problem isn't effort. It's math.

You can't create excellent content for 6 different audiences, formats, and algorithms simultaneously. Nobody can. You just end up mediocre everywhere — and mediocre doesn't convert.

Here's the thing nobody in your DMs is telling you:

Your best clients are concentrated on 1 or 2 platforms. Not spread evenly across all of them. That means 80% of your posting is reaching people who will never buy from you.

What we do instead:

1. Ask your last 3 clients exactly where they found you. That's your platform.
2. Match the format to how you naturally create — writing → LinkedIn, visual → Instagram, teaching → YouTube.
3. Commit 90 days. Go deep before you go wide.

I had one client posting on 6 platforms. Engagement rate: 0.3%. We cut to LinkedIn only for 90 days. Engagement hit 2.4%. Three inbound leads that month — the first in five months of daily posting.

Not more content. Better content, in the right place.

Which platform has actually brought you clients? Drop it below — I'm curious whether the data matches the assumption.`,
        changes_made: [
          "Replaced declarative hook with a scene-setting opener that shows rather than tells",
          "Removed 'This 1 mindset shift changed everything' — hollow opener with no specific content",
          "Replaced 'what gurus won't tell you' framing with a direct, confident statement",
          "Added one specific client result (0.3% → 2.4% engagement, 3 leads) to replace vague claims",
          "Removed empathy padding — the reframe lands harder without the setup",
          "Tightened framework to 3 clean numbered steps without emoji overload",
          "Changed CTA to 'which platform has actually brought you clients' — more specific, higher-intent responses",
          "Cut inspirational closing lines that added length without adding value"
        ],
        good_practices_applied: [
          "Hook: Opens with a specific scenario rather than a bold declarative claim",
          "Specificity: One real client outcome with actual numbers replaces vague proof",
          "Clarity: Single core idea throughout",
          "Structure: Short paragraphs and white space for LinkedIn readability",
          "CTA: Specific question tied to client outcomes, not generic engagement bait",
          "Authenticity: Proof is earned through a real example, not performed through adjectives"
        ]
      }
    };

    const scoreColor = (score) => {
      if (score >= 7) return "text-emerald-600";
      if (score >= 5) return "text-amber-500";
      return "text-red-500";
    };

    const Badge = ({ label, color }) => {
      const colors = {
        positive: "bg-emerald-100 text-emerald-700 border border-emerald-200",
        negative: "bg-red-100 text-red-700 border border-red-200",
        neutral: "bg-slate-100 text-slate-600 border border-slate-200",
      };
      return (
        <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${colors[color]}`}>
          {label}
        </span>
      );
    };

    const Section = ({ title, children, defaultOpen = false }) => {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <div className="border border-slate-200 rounded-xl overflow-hidden mb-3">
          <button
            onClick={() => setOpen(!open)}
            className="w-full flex items-center justify-between px-5 py-4 bg-white hover:bg-slate-50 transition-colors text-left"
          >
            <span className="font-semibold text-slate-800 text-sm">{title}</span>
            <span className="text-slate-400 text-lg">{open ? "−" : "+"}</span>
          </button>
          {open && <div className="px-5 pb-5 pt-1 bg-white border-t border-slate-100">{children}</div>}
        </div>
      );
    };

    function App() {
      return (
        <div className="min-h-screen bg-slate-50 py-8 px-4">
          <div className="max-w-2xl mx-auto">
            <div className="mb-6">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-xs font-semibold uppercase tracking-widest text-blue-500">Post Analysis</span>
                <span className="text-xs text-slate-400">•</span>
                <span className="text-xs text-slate-500">{data.platform_detected}</span>
              </div>
              <h1 className="text-2xl font-bold text-slate-900">Platform Focus Post</h1>
              <p className="text-sm text-slate-500 mt-1">{data.author_type}</p>
            </div>

            <div className="grid grid-cols-3 gap-3 mb-6">
              <div className="bg-white rounded-xl p-4 border border-slate-200 text-center">
                <div className={`text-3xl font-bold ${scoreColor(data.extended_analysis.authenticity_score)}`}>
                  {data.extended_analysis.authenticity_score}/10
                </div>
                <div className="text-xs text-slate-500 mt-1 font-medium">Authenticity</div>
              </div>
              <div className="bg-white rounded-xl p-4 border border-slate-200 text-center">
                <div className="text-3xl font-bold text-amber-500">5/10</div>
                <div className="text-xs text-slate-500 mt-1 font-medium">Originality</div>
              </div>
              <div className="bg-white rounded-xl p-4 border border-slate-200 text-center">
                <div className="text-3xl font-bold text-emerald-600">7/10</div>
                <div className="text-xs text-slate-500 mt-1 font-medium">Engagement</div>
              </div>
            </div>

            <div className="bg-white rounded-xl border border-slate-200 p-4 mb-6">
              <div className="grid grid-cols-2 gap-4 text-sm">
                <div>
                  <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Tone</div>
                  <div className="text-slate-700">{data.tone_and_impact.tone}</div>
                </div>
                <div>
                  <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Target Audience</div>
                  <div className="text-slate-700 text-xs">{data.target_audience}</div>
                </div>
              </div>
            </div>

            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6">
              <div className="text-xs font-bold text-amber-700 uppercase tracking-wider mb-1">⚡ #1 Priority Fix</div>
              <p className="text-sm text-amber-900">{data.overall_critique.top_improvement}</p>
            </div>

            <Section title="✅ What's Working vs. 🎭 Storytelling Only" defaultOpen={true}>
              <div className="mb-4">
                <div className="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-2">Genuine Strengths</div>
                <ul className="space-y-2">
                  {data.options.positive.map((p, i) => (
                    <li key={i} className="flex gap-2 text-sm text-slate-700">
                      <span className="text-emerald-500 mt-0.5 shrink-0">✓</span>{p}
                    </li>
                  ))}
                </ul>
              </div>
              <div>
                <div className="text-xs font-bold text-orange-500 uppercase tracking-wider mb-2">Storytelling Only (No Real Substance)</div>
                <ul className="space-y-2">
                  {data.options.storytelling_only.map((p, i) => (
                    <li key={i} className="flex gap-2 text-sm text-slate-700">
                      <span className="text-orange-400 mt-0.5 shrink-0">~</span>{p}
                    </li>
                  ))}
                </ul>
              </div>
            </Section>

            <Section title="📖 Segment-by-Segment Breakdown">
              <div className="space-y-3">
                {data.story_analysis.map((s, i) => (
                  <div key={i} className="border border-slate-100 rounded-lg p-3">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-xs font-bold text-slate-700">{s.segment}</span>
                      <Badge label={s.value_assessment} color={s.value_assessment} />
                    </div>
                    <p className="text-xs text-slate-500 italic mb-1">"{s.content}"</p>
                    <p className="text-xs text-slate-600">{s.explanation}</p>
                  </div>
                ))}
              </div>
            </Section>

            <Section title="🔍 Rhetorical Devices & Subtext">
              <div className="mb-4">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Rhetorical Devices Used</div>
                <ul className="space-y-1.5">
                  {data.extended_analysis.rhetorical_devices.map((r, i) => (
                    <li key={i} className="text-xs text-slate-700 flex gap-2">
                      <span className="text-purple-400 shrink-0">→</span>{r}
                    </li>
                  ))}
                </ul>
              </div>
              <div className="bg-slate-50 rounded-lg p-3">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">What This Post Is Really Doing</div>
                <p className="text-sm text-slate-700">{data.extended_analysis.subtext}</p>
              </div>
            </Section>

            <Section title="📊 Overall Critique">
              {[
                { label: "Strengths", content: data.overall_critique.strengths, color: "text-emerald-700" },
                { label: "Weaknesses", content: data.overall_critique.weaknesses, color: "text-red-600" },
                { label: "Hidden Agenda", content: data.overall_critique.hidden_agenda, color: "text-purple-700" },
                { label: "Credibility", content: data.overall_critique.credibility_assessment, color: "text-blue-700" },
                { label: "Platform Fit", content: data.overall_critique.platform_fit, color: "text-slate-700" },
              ].map((item, i) => (
                <div key={i} className="mb-3">
                  <div className={`text-xs font-bold uppercase tracking-wider mb-1 ${item.color}`}>{item.label}</div>
                  <p className="text-sm text-slate-700">{item.content}</p>
                </div>
              ))}
            </Section>

            <Section title="💡 Alternative Angles to Consider">
              <ul className="space-y-2">
                {data.alternative_suggestions.map((s, i) => (
                  <li key={i} className="flex gap-2 text-sm text-slate-700">
                    <span className="font-bold text-blue-400 shrink-0">{i + 1}.</span>{s}
                  </li>
                ))}
              </ul>
            </Section>

            <Section title="✍️ Rewritten Post (Publish-Ready)">
              <div className="bg-slate-900 rounded-lg p-4 mb-4">
                <pre className="text-sm text-slate-100 whitespace-pre-wrap font-sans leading-relaxed">{data.rewritten_post.post}</pre>
              </div>
              <div className="mb-4">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Changes Made</div>
                <ul className="space-y-1.5">
                  {data.rewritten_post.changes_made.map((c, i) => (
                    <li key={i} className="text-xs text-slate-600 flex gap-2">
                      <span className="text-blue-400 shrink-0">→</span>{c}
                    </li>
                  ))}
                </ul>
              </div>
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Best Practices Applied</div>
                <div className="flex flex-wrap gap-2">
                  {data.rewritten_post.good_practices_applied.map((g, i) => (
                    <span key={i} className="text-xs bg-blue-50 text-blue-700 border border-blue-100 px-2 py-1 rounded-full">{g.split(":")[0]}</span>
                  ))}
                </div>
              </div>
            </Section>

            <div className="mt-4 text-center text-xs text-slate-400">Social Post Analyzer • LinkedIn Post Review</div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
```
